version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wex-transaction-db
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_user -d transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wex-transaction-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transaction_db
      DB_USERNAME: transaction_user
      DB_PASSWORD: transaction_pass
    ports:
      - "8080:8080"

volumes:
  postgres_data:
